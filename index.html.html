<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рестораны Манаса PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER С ФОНОМ -->
<header class="text-white text-center relative"
        style="background-image: url('https://ru.kabar.kg/media/images/WhatsApp_Image_fFjw8Et.max-25.max-1920x1080.format-webp.webp'); 
               background-size: cover; 
               background-position: center; 
               background-repeat: no-repeat; 
               height: 500px;">
  <div class="absolute inset-0 bg-black/50"></div>
  <h1 class="text-3xl font-bold relative z-10 pt-20">Рестораны Манаса</h1>
</header>

<div class="max-w-6xl mx-auto p-4">

<!-- SEARCH + FILTER -->
<div class="flex flex-col md:flex-row gap-3 mb-4">
  <input id="search" placeholder="Поиск..." class="p-3 w-full border rounded">
  <select id="filter" class="p-3 border rounded">
    <option value="0">Все рейтинги</option>
    <option value="4.5">4.5+</option>
    <option value="4.7">4.7+</option>
    <option value="4.8">4.8+</option>
  </select>
</div>

<div class="flex gap-3 mb-4">
  <button onclick="showFavorites()" class="bg-pink-500 text-white px-4 py-2 rounded">
    Избранное
  </button>

  <button onclick="openCart()" class="bg-green-600 text-white px-4 py-2 rounded">
    Корзина (<span id="count">0</span>)
  </button>
</div>

<div id="list" class="grid md:grid-cols-3 gap-4"></div>

<div id="restaurantPage" class="hidden"></div>

</div>

<!-- CART -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-96">
    <h2 class="text-xl mb-4">Корзина</h2>
    <div id="cartItems"></div>
    <p class="mt-3 font-bold">Сумма: <span id="total">0</span> с</p>
    <input id="address" placeholder="Введите адрес" class="w-full p-2 border mt-3">
    <button onclick="checkout()" class="mt-3 bg-green-600 text-white w-full py-2 rounded">
      Оформить заказ
    </button>
    <button onclick="closeCart()" class="mt-2 bg-red-500 text-white w-full py-2 rounded">
      Закрыть
    </button>
  </div>
</div>

<script>

]
}
},
{
id:3,

rating:4.7,

],
"Напитки":[

]

}
];

let cart = [];
let fav = [];

function render(list=data){
let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let filtered = list.filter(r =>
r.name.toLowerCase().includes(search) &&
(filter==0 || r.rating>=filter)
);

document.getElementById("list").innerHTML = filtered.map(r=>`
<div class="bg-white rounded shadow">
<img src="${r.image}" class="w-full h-40 object-cover">
<div class="p-4">
<h2 class="text-lg font-bold">${r.name}</h2>
<p>⭐ ${r.rating}</p>
<button onclick="openRestaurant(${r.id})" class="bg-amber-600 text-white w-full mt-2 py-2 rounded">
Подробнее
</button>
<button onclick="toggleFav(${r.id})" class="mt-2">
${fav.includes(r.id) ? "❤️" : "🤍"}
</button>
</div>
</div>
`).join("");
}

function openRestaurant(id){
let r = data.find(x=>x.id==id);
document.getElementById("list").style.display="none";
document.getElementById("restaurantPage").classList.remove("hidden");
document.getElementById("restaurantPage").innerHTML = `
<button onclick="back()" class="mb-4">← Назад</button>
<h1 class="text-2xl font-bold mb-3">${r.name}</h1>
<img src="${r.image}" class="w-full h-60 object-cover rounded mb-4">
${Object.entries(r.menu).map(([cat,items])=>`
<h2 class="text-xl font-bold mt-4">${cat}</h2>
<div class="grid md:grid-cols-2 gap-3">
${items.map(item=>`
<div class="bg-white p-3 rounded shadow">
<img src="${item.img}" class="w-full h-32 object-cover rounded mb-2">
<div class="flex justify-between items-center">
<div>
<p class="font-bold">${item.name}</p>
<p>${item.price} с</p>
<p>⭐ ${item.rating}</p>
</div>
<button onclick="add('${item.name}', ${item.price})"
class="bg-green-500 text-white px-3 py-1 rounded">+</button>
</div>
</div>
`).join("")}
</div>
`).join("")}
`;
}

function back(){
document.getElementById("restaurantPage").classList.add("hidden");
document.getElementById("list").style.display="grid";
}

function add(name,price){
cart.push({name,price});
updateCart();
}

function updateCart(){
document.getElementById("count").innerText = cart.length;
}

function openCart(){
document.getElementById("cartModal").classList.remove("hidden");
let total=0;
document.getElementById("cartItems").innerHTML = cart.map((i,index)=>{
total+=i.price;
return `
<div class="flex justify-between border-b py-2">
${i.name} - ${i.price}
<button onclick="removeItem(${index})">❌</button>
</div>
`;
}).join("");
document.getElementById("total").innerText=total;
}

function closeCart(){
document.getElementById("cartModal").classList.add("hidden");
}

function removeItem(i){
cart.splice(i,1);
openCart();
updateCart();
}

function checkout(){
let addr=document.getElementById("address").value;
if(!addr){alert("Введите адрес");return;}
alert("Заказ оформлен! "+addr);
cart=[];
updateCart();
closeCart();
}

function toggleFav(id){
if(fav.includes(id)){
fav=fav.filter(x=>x!=id);
}else{
fav.push(id);
}
render();
}

function showFavorites(){
render(data.filter(x=>fav.includes(x.id)));
}

document.getElementById("search").oninput=()=>render();
document.getElementById("filter").onchange=()=>render();
render();

</script>

</body>
</html>
